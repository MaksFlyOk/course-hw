name: deploy.yml
on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Build
        run: |
          cd ./module-2-blog-app
          npm install
          npm run build

      - name: Deploy
        run: cd ./course && npm run deploy
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}