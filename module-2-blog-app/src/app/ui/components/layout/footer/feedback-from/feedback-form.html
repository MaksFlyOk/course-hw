<form [formGroup]="feedbackFrom" (ngSubmit)="onSubmit()">
  <blog-app-form-field
    id="email"
    label="Ваш Email"
    [type]="formFieldType.Email"
    [loading]="isLoading()"
    [disabled]="isLoading()"
    placeholder="Ваш Email"
    [control]="feedbackFrom.controls.email"
    [theme]="formTheme"
  />
  <blog-app-form-field
    id="content"
    label="Ваше сообщение"
    [type]="formFieldType.TextArea"
    [loading]="isLoading()"
    [disabled]="isLoading()"
    placeholder="Опишите ваш проект или задачу"
    [control]="feedbackFrom.controls.message"
    [theme]="formTheme"
  />
  <div class="add-article-form__buttons">
    <blog-app-button
      buttonText="Отправить"
      [buttonType]="ButtonType.Submit"
      [loading]="isLoading()"
      [disabled]="feedbackFrom.invalid || isLoading()"
      (callback)="onSubmit()"
    />
  </div>
</form>
