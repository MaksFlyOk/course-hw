<header class="header">
  <span class="header-logo" aria-label="Логотип">MaksFlyOk</span>
  <nav aria-label="Основная навигация">
    <ul class="nav-list">
      <li class="nav-list__item">
        <a
          routerLink=""
          routerLinkActive="current-page-link"
          [routerLinkActiveOptions]="{exact:true}"
          target="_self"
          aria-current="page"
          aria-label="Текущая страница 'Главная'"
          data-text="Главная"
        >
          Главная
        </a>
      </li>
      <li class="nav-list__item">
        <a
          routerLink="blog"
          routerLinkActive="current-page-link"
          target="_self"
          aria-label="Перейти на страницу 'Блог'"
          data-text="Блог"
        >
          Блог
        </a>
      </li>
      <li class="nav-list__item">
        <a
          [routerLink]="currentPath()"
          fragment="contacts"
          target="_self"
          aria-label="Перейти к разделу 'Контакты'"
          data-text="Контакты"
        >
          Контакты
        </a>
      </li>
    </ul>
  </nav>
</header>
