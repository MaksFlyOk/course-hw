<dialog
  #dialogElement
  [attr.aria-labelledby]="title()"
  (click)="onClose($event)"
>
  <section class="modal">
    <header class="modal__header">
      <h2>{{ title() }}</h2>
      <blog-app-button
        buttonText="✕"
        [variant]="buttonVariant"
        [color]="buttonColor"
        (callback)="onClose()"
      />
    </header>
    <div class="modal__content">
      <ng-content />
    </div>
  </section>
</dialog>
