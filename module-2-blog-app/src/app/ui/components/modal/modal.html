<dialog
  #dialogElement
  [attr.aria-labelledby]="title()"
  (click)="onClose($event)"
>
  <section class="modal">
    <header class="modal__header">
      <h2>{{ title() }}</h2>
      <button
        class="border-button"
        type="button"
        aria-label="Закрыть"
        (click)="onClose()">✕</button>
    </header>
    <div class="modal__content">
      <ng-content />
    </div>
  </section>
</dialog>
