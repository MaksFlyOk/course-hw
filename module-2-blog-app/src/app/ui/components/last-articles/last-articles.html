<section class="blog" id="blog">
  @let quantityArticles = lastArticles().length;

  @if (quantityArticles !== 0) {
    <h2>{{ sectionTitle() }}</h2>
    <div>
      @if (isLoading()) {
        <blog-app-spinner/>
      } @else {
        @for (article of lastArticles(); track article.id) {
          <a
            [routerLink]="['/blog', article.id]"
            target="_self"
            [attr.aria-label]="`Перейти к странице статьи '${article.title}'`"
          >
            <article class="blog-item">
              <header class="blog-item__header">
                <time [attr.datetime]="article.createdAt">
                  {{ article.createdAt | date:"longDate":"":"ru-RU" }}
                </time>
                <h3>{{ article.title }}</h3>
                <p>{{ article.content }}</p>
              </header>
              <img [src]="article.imgSrc" [alt]="'Обложка статьи ' + article.title">
            </article>
          </a>
        }
        <blog-app-button
          buttonText="Посмотреть все статьи"
          [variant]="buttonVariant.Outlined"
          (callback)="router.navigate(['blog'])"
        />
      }
    </div>
  }
</section>
