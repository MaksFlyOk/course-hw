<div class="rating-wrapper mat-elevation-z1">
  <div class="rating-container">
    <button matIconButton
            (click)="updateRating(1)"
            [attr.aria-label]="value() === 1 ? 'Убрать лайк' : 'Поставить лайк'"
    >
      <mat-icon [class.liked]="value() === 1">thumb_up</mat-icon>
    </button>
    <button matIconButton
            (click)="updateRating(-1)"
            [attr.aria-label]="value() === -1 ? 'Убрать дизлайк' : 'Поставить дизлайк'"
    >
      <mat-icon [class.disliked]="value() === -1">thumb_down</mat-icon>
    </button>
  </div>
</div>
