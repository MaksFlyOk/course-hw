<section class="add-article" id="add-article-anchor">
  <div class="add-article-wrapper" [class.is-open]="isOpen()">
    <div class="add-article-content">
      <h2>Добавить статью</h2>
      <form [formGroup]="articleForm" (ngSubmit)="onSubmit()">
        <blog-app-form-field
          id="title"
          label="Заголовок"
          [type]="formFieldType.Text"
          [loading]="isLoading()"
          [disabled]="isLoading()"
          placeholder="Заголовок"
          [control]="articleForm.controls.title"
          [theme]="formTheme"
        />
        <blog-app-form-field
          id="content"
          label="Текст статьи"
          [type]="formFieldType.TextArea"
          [loading]="isLoading()"
          [disabled]="isLoading()"
          placeholder="Текст статьи"
          [control]="articleForm.controls.content"
          [theme]="formTheme"
        />
        <div class="add-article-form__buttons">
          <blog-app-button
            buttonText="Добавить"
            [disabled]="articleForm.invalid"
            [loading]="isLoading()"
            [buttonType]="buttonType.Submit"
          />
          <blog-app-button
            buttonText="Отмена"
            [variant]="buttonVariant.Outlined"
            [color]="buttonColor.Red"
            [loading]="isLoading()"
            [buttonType]="buttonType.Reset"
            (callback)="onReset()"
          />
        </div>
      </form>
    </div>
  </div>
</section>
