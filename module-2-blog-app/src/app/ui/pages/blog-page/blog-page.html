<blog-app-stat-modal [totalArticles]="totalArticles()" [totalComments]="0"/>
<main>
<blog-app-side-menu [sideMenuButtons]="sideMenuButtons" />
  <section>
    <blog-app-blog-header/>
    <blog-app-articles-list
      [articles]="articles()"
      [isLoading]="isLoading()"
      (deleteArticle)="deleteArticle($event)"
      (editArticle)="editArticle($event)"
    />
  </section>
  <blog-app-article-form
    #articleForm
    (submitted)="handleFormSubmit($event)"
    [editArticleData]="editArticleData()"
  />
</main>
