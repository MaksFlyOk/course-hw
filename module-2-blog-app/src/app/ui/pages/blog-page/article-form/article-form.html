<blog-app-update-category-modal
  (created)="updateCategory($event)"
/>
<section class="add-article" id="add-article-anchor">
  <div
    class="add-article-wrapper"
    [class.is-open]="isOpen()"
    [class.is-visible]="isFullyOpen()"
    (transitionend)="onTransitionEnd($event)"
    (transitionstart)="onTransitionStart($event)"
  >
    <div class="add-article-content">
      <h2>{{ articleFormTitles[formVariant()] }}</h2>
      <form [formGroup]="articleForm" (ngSubmit)="onSubmit()">
        <blog-app-form-field
          id="title"
          label="Заголовок"
          [type]="formFieldType.Text"
          [loading]="isLoading()"
          [disabled]="isLoading()"
          placeholder="Заголовок"
          [control]="articleForm.controls.title"
          [theme]="formTheme"
        />
        <blog-app-form-field
          id="description"
          label="Текст статьи"
          [type]="formFieldType.TextArea"
          [loading]="isLoading()"
          [disabled]="isLoading()"
          placeholder="Текст статьи"
          [control]="articleForm.controls.content"
          [theme]="formTheme"
        />
        <blog-app-search-select-with-create
          id="category"
          label="Категория статьи"
          placeholder="Выберите категорию статьи..."
          formControlName="categoryId"
          [control]="articleForm.controls.categoryId"
          [options]="categories()"
          [loading]="isLoading() || isCategoriesLoading()"
          [loadingOption]="isAddNewCategoryLoading() || isUpdateCategoryLoading()"
          (deleted)="deleteCategory($event)"
          (edited)="openUpdateCategoryModal($event)"
          [theme]="formTheme"
        />
        @if (formVariant() === ArticleFormVariants.Add) {
          @if (useLocalStorage) {
            <blog-app-search-select-images
              id="imgSrc"
              label="Изображение"
              placeholder="Выберите изображение"
              [options]="optionsImage()"
              [control]="articleForm.controls.imgSrc"
              formControlName="imgSrc"
            />
          } @else {
            <blog-app-drag-and-drop-image-field
              id="image"
              label="Изображение"
              placeholder="Перетащите изображение или нажмите для выбора"
              [control]="articleForm.controls.image"
              formControlName="image"
            />
          }
        }
        <div class="add-article-form__buttons">
          <blog-app-button
            [buttonText]="articleFormButtonSubmitTitles[formVariant()]"
            [disabled]="articleForm.invalid || isLoading()"
            [loading]="isLoading()"
            [buttonType]="buttonType.Submit"
          />
          <blog-app-button
            buttonText="Отмена"
            [variant]="buttonVariant.Outlined"
            [color]="buttonColor.Red"
            [loading]="isLoading()"
            [disabled]="isLoading()"
            [buttonType]="buttonType.Reset"
            (callback)="onReset()"
          />
        </div>
      </form>
    </div>
  </div>
</section>
